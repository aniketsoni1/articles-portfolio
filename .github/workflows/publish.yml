name: Publish to Dev.to

on:
  push:
    branches: [main]
    paths:
      - "articles/**"        # run when an article is added/changed
  schedule:
    - cron: "5 18 * * *"     # 18:05 UTC — 5 min after the generator runs
  workflow_dispatch:
    inputs:
      publish_all:
        description: "Sync ALL articles regardless of date (backfill)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync articles to Dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          PUBLISH_ALL: ${{ inputs.publish_all }}
        run: python scripts/post_to_devto.py
