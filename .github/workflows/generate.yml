name: Generate daily article

on:
  schedule:
    - cron: "0 8 * * *"     # every day at 08:00 UTC
  workflow_dispatch: {}       # manual trigger button for testing

permissions:
  contents: write             # allow the job to commit the new article back

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ARTICLE_TOPICS: ${{ secrets.ARTICLE_TOPICS }}
        run: python scripts/generate_article.py

      - name: Commit the new article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/
          git diff --staged --quiet || git commit -m "Add daily article ($(date -u +%Y-%m-%d))"
          git push

      - name: Push drafts to Dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: python scripts/post_to_devto.py
